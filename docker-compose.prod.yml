services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ragchat-backend-prod
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: ragchat-frontend-prod
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
